[book]
authors = ["Rafael Fernandez"]
language = "en"
src = "src"
title = "Teckel Specification"
description = "Documentation for the Teckel declarative ETL pipeline language"

[build]
build-dir = "book"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
additional-css = ["theme/css/custom.css"]
git-repository-url = "https://github.com/eff3ct0/teckel-spec"
edit-url-template = "https://github.com/eff3ct0/teckel-spec/edit/main/docs/{path}"
site-url = "/teckel-spec/"
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 20
heading-split-level = 2
