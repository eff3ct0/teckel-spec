name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build site
        working-directory: website
        run: npm run build

      - name: Package spec artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Determine which spec version directory to package
          if [ -d "spec/v3.0" ]; then
            SPEC_DIR="spec/v3.0"
          else
            SPEC_DIR="spec/v2.0"
          fi
          mkdir -p release-artifacts
          cp "${SPEC_DIR}/teckel-spec.md" "release-artifacts/teckel-spec-${VERSION}.md"
          cp "${SPEC_DIR}/teckel-schema.json" "release-artifacts/teckel-schema-${VERSION}.json"
          tar -czf "release-artifacts/teckel-spec-${VERSION}.tar.gz" "${SPEC_DIR}/"

      - name: Determine pre-release
        id: prerelease
        run: |
          if [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF_NAME" =~ ^v.*-(rc|alpha|beta) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ steps.prerelease.outputs.draft == 'true' }}
          prerelease: ${{ steps.prerelease.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: release-artifacts/*
