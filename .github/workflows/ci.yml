name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build site
        working-directory: website
        run: npm run build

      - name: Check for broken links
        working-directory: website
        run: npm run build 2>&1 | grep -i "broken" && exit 1 || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: TypeScript type check
        working-directory: website
        run: npx tsc --noEmit --skipLibCheck

  validate-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON Schema is valid JSON
        run: |
          python3 -c "import json; json.load(open('spec/v2.0/teckel-schema.json'))"
          python3 -c "import json; json.load(open('spec/v3.0/teckel-schema.json'))"

      - name: Schema files in sync
        run: |
          diff spec/v3.0/teckel-schema.json website/static/teckel-schema.json \
            || (echo "::error::website/static/teckel-schema.json is out of sync with spec/v3.0/teckel-schema.json" && exit 1)
