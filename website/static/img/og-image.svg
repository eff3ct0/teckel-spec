<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#09090b"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#a1a1aa" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="#3b82f6"/>

  <!-- Title -->
  <text x="100" y="220" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#fafafa">
    Teckel
  </text>

  <!-- Subtitle -->
  <text x="100" y="290" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#a1a1aa">
    Data pipelines, declared in YAML.
  </text>

  <!-- YAML snippet decoration -->
  <g transform="translate(100, 340)" opacity="0.6">
    <text font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="18" fill="#71717a">
      <tspan x="0" dy="0" fill="#3b82f6">version</tspan><tspan fill="#71717a">: </tspan><tspan fill="#a3e635">"2.0"</tspan>
    </text>
    <text font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="18" fill="#71717a">
      <tspan x="0" dy="28" fill="#3b82f6">input</tspan><tspan fill="#71717a">:</tspan>
    </text>
    <text font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="18" fill="#71717a">
      <tspan x="0" dy="28">  - </tspan><tspan fill="#3b82f6">name</tspan><tspan fill="#71717a">: orders</tspan>
    </text>
    <text font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="18" fill="#71717a">
      <tspan x="0" dy="28" fill="#3b82f6">transformation</tspan><tspan fill="#71717a">:</tspan>
    </text>
    <text font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="18" fill="#71717a">
      <tspan x="0" dy="28">  - </tspan><tspan fill="#3b82f6">name</tspan><tspan fill="#71717a">: enriched</tspan>
    </text>
    <text font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="18" fill="#71717a">
      <tspan x="0" dy="28" fill="#3b82f6">output</tspan><tspan fill="#71717a">:</tspan>
    </text>
    <text font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="18" fill="#71717a">
      <tspan x="0" dy="28">  - </tspan><tspan fill="#3b82f6">name</tspan><tspan fill="#71717a">: summary</tspan>
    </text>
  </g>

  <!-- Pipeline flow arrows (right side) -->
  <g transform="translate(750, 180)">
    <!-- Input node -->
    <rect x="0" y="0" width="140" height="50" rx="8" fill="#18181b" stroke="#3b82f6" stroke-width="2"/>
    <text x="70" y="30" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#fafafa" text-anchor="middle">Input</text>

    <!-- Arrow 1 -->
    <line x1="70" y1="50" x2="70" y2="90" stroke="#3f3f46" stroke-width="2"/>
    <polygon points="62,85 70,95 78,85" fill="#3f3f46"/>

    <!-- Transform node -->
    <rect x="0" y="95" width="140" height="50" rx="8" fill="#18181b" stroke="#a855f7" stroke-width="2"/>
    <text x="70" y="125" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#fafafa" text-anchor="middle">Transform</text>

    <!-- Arrow 2 -->
    <line x1="70" y1="145" x2="70" y2="185" stroke="#3f3f46" stroke-width="2"/>
    <polygon points="62,180 70,190 78,180" fill="#3f3f46"/>

    <!-- Output node -->
    <rect x="0" y="190" width="140" height="50" rx="8" fill="#18181b" stroke="#22c55e" stroke-width="2"/>
    <text x="70" y="220" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#fafafa" text-anchor="middle">Output</text>

    <!-- Second column -->
    <rect x="200" y="0" width="140" height="50" rx="8" fill="#18181b" stroke="#3b82f6" stroke-width="2"/>
    <text x="270" y="30" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#fafafa" text-anchor="middle">Quality</text>

    <rect x="200" y="95" width="140" height="50" rx="8" fill="#18181b" stroke="#f59e0b" stroke-width="2"/>
    <text x="270" y="125" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#fafafa" text-anchor="middle">Metadata</text>

    <rect x="200" y="190" width="140" height="50" rx="8" fill="#18181b" stroke="#06b6d4" stroke-width="2"/>
    <text x="270" y="220" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#fafafa" text-anchor="middle">Governance</text>

    <!-- Connector lines -->
    <line x1="140" y1="120" x2="200" y2="25" stroke="#3f3f46" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="140" y1="120" x2="200" y2="120" stroke="#3f3f46" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="140" y1="120" x2="200" y2="215" stroke="#3f3f46" stroke-width="1" stroke-dasharray="4,4"/>
  </g>

  <!-- Bottom bar -->
  <text x="100" y="590" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400" fill="#52525b">
    teckel.rafaelfernandez.dev
  </text>
  <text x="1100" y="590" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400" fill="#52525b" text-anchor="end">
    Specification v2.0
  </text>
</svg>
