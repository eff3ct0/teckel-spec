<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" fill="none">
  <style>
    /* Default: dark mode (existing colors) */
    .bg-main { fill: none; }
    .bg-border { stroke: #27272a; }

    /* Light mode overrides */
    @media (prefers-color-scheme: light) {
      .bg-border { stroke: #e4e4e7; }

      /* Text color inversions */
      text[fill="#e4e4e7"] { fill: #18181b; }
      text[fill="#d4d4d8"] { fill: #27272a; }
      text[fill="#a1a1aa"] { fill: #52525b; }
      text[fill="#71717a"] { fill: #6b7280; }
      text[fill="#52525b"] { fill: #71717a; }
      text[fill="#3f3f46"] { fill: #a1a1aa; }

      /* Stroke/line inversions */
      path[stroke="#3f3f46"] { stroke: #d4d4d8; }
      line[stroke="#3f3f46"] { stroke: #d4d4d8; }
      line[stroke="#27272a"] { stroke: #e4e4e7; }
      path[stroke="#27272a"] { stroke: #e4e4e7; }

      /* Arrow markers */
      marker path[stroke="#71717a"] { stroke: #6b7280; }
      marker path[stroke="#ef4444"] { stroke: #ef4444; }

      /* Rect borders */
      rect[stroke="#27272a"] { stroke: #e4e4e7; }
      rect[stroke="#3f3f46"] { stroke: #d4d4d8; }

      /* Card/container fills - subtle backgrounds */
      rect[fill="#3f3f46"] { fill: #d4d4d8; }

      /* Venn diagram cover fills (used in except/anti) */
      circle[fill="#18181b"] { fill: #ffffff; }

      /* Table header backgrounds */
      rect[fill-opacity="0.3"][fill="#3f3f46"] { fill: #e4e4e7; fill-opacity: 0.5; }
    }
  </style>

  <rect width="720" height="380" rx="16" class="bg-main"/>
  <rect width="720" height="380" rx="16" class="bg-border" stroke-width="1" fill="none"/>

  <text x="360" y="36" text-anchor="middle" fill="#a1a1aa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" letter-spacing="0.1em">WINDOW FUNCTION — PARTITION + ORDER + FRAME</text>

  <!-- Source table -->
  <g transform="translate(40, 56)">
    <text x="0" y="14" fill="#71717a" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" font-weight="500">Source rows</text>

    <!-- Header -->
    <rect x="0" y="24" width="240" height="24" rx="4" fill="#3f3f46" fill-opacity="0.3"/>
    <text x="12" y="40" fill="#a1a1aa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" font-weight="600">dept</text>
    <text x="80" y="40" fill="#a1a1aa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" font-weight="600">name</text>
    <text x="170" y="40" fill="#a1a1aa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" font-weight="600">salary</text>

    <!-- Partition A (Engineering) -->
    <rect x="0" y="52" width="240" height="72" rx="0" fill="#3b82f6" fill-opacity="0.06" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="0.75"/>
    <text x="12" y="70" fill="#60a5fa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">Eng</text>
    <text x="80" y="70" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">Alice</text>
    <text x="170" y="70" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">90000</text>
    <text x="12" y="90" fill="#60a5fa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">Eng</text>
    <text x="80" y="90" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">Bob</text>
    <text x="170" y="90" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">85000</text>
    <text x="12" y="110" fill="#60a5fa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">Eng</text>
    <text x="80" y="110" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">Carol</text>
    <text x="170" y="110" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">78000</text>

    <!-- Partition B (Sales) -->
    <rect x="0" y="128" width="240" height="52" rx="0" fill="#a855f7" fill-opacity="0.06" stroke="#a855f7" stroke-opacity="0.15" stroke-width="0.75"/>
    <text x="12" y="148" fill="#c084fc" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">Sales</text>
    <text x="80" y="148" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">Dan</text>
    <text x="170" y="148" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">72000</text>
    <text x="12" y="168" fill="#c084fc" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">Sales</text>
    <text x="80" y="168" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">Eve</text>
    <text x="170" y="168" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">68000</text>

    <!-- Partition labels -->
    <text x="228" y="92" text-anchor="end" fill="#3b82f6" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="8" opacity="0.6">partition 1</text>
    <text x="228" y="160" text-anchor="end" fill="#a855f7" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="8" opacity="0.6">partition 2</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(300, 130)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#3f3f46" stroke-width="1.5" marker-end="url(#arr8)"/>
    <text x="30" y="-10" text-anchor="middle" fill="#71717a" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="8">partitionBy</text>
    <text x="30" y="16" text-anchor="middle" fill="#52525b" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="8">[dept]</text>
  </g>

  <!-- Result table -->
  <g transform="translate(380, 56)">
    <text x="0" y="14" fill="#71717a" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" font-weight="500">Result with window columns</text>

    <!-- Header -->
    <rect x="0" y="24" width="300" height="24" rx="4" fill="#3f3f46" fill-opacity="0.3"/>
    <text x="12" y="40" fill="#a1a1aa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" font-weight="600">name</text>
    <text x="80" y="40" fill="#a1a1aa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" font-weight="600">salary</text>
    <text x="160" y="40" fill="#22c55e" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" font-weight="600">rank</text>
    <text x="210" y="40" fill="#22c55e" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" font-weight="600">dept_avg</text>

    <!-- Partition A results -->
    <rect x="0" y="52" width="300" height="72" rx="0" fill="#3b82f6" fill-opacity="0.04"/>
    <text x="12" y="70" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">Alice</text>
    <text x="80" y="70" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">90000</text>
    <text x="160" y="70" fill="#4ade80" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">1</text>
    <text x="210" y="70" fill="#4ade80" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">84333</text>

    <text x="12" y="90" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">Bob</text>
    <text x="80" y="90" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">85000</text>
    <text x="160" y="90" fill="#4ade80" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">2</text>
    <text x="210" y="90" fill="#4ade80" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">84333</text>

    <text x="12" y="110" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">Carol</text>
    <text x="80" y="110" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">78000</text>
    <text x="160" y="110" fill="#4ade80" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">3</text>
    <text x="210" y="110" fill="#4ade80" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">84333</text>

    <!-- Partition B results -->
    <rect x="0" y="128" width="300" height="52" rx="0" fill="#a855f7" fill-opacity="0.04"/>
    <text x="12" y="148" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">Dan</text>
    <text x="80" y="148" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">72000</text>
    <text x="160" y="148" fill="#4ade80" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">1</text>
    <text x="210" y="148" fill="#4ade80" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">70000</text>

    <text x="12" y="168" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">Eve</text>
    <text x="80" y="168" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">68000</text>
    <text x="160" y="168" fill="#4ade80" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">2</text>
    <text x="210" y="168" fill="#4ade80" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">70000</text>
  </g>

  <!-- Window spec box -->
  <g transform="translate(40, 250)">
    <rect width="640" height="80" rx="10" fill="#a1a1aa" fill-opacity="0.04" stroke="#27272a" stroke-width="0.75"/>
    <text x="20" y="22" fill="#a1a1aa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" font-weight="500">Window specification</text>

    <rect x="20" y="34" width="140" height="30" rx="6" fill="#3b82f6" fill-opacity="0.06" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="0.75"/>
    <text x="32" y="48" fill="#60a5fa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" font-weight="500">partitionBy</text>
    <text x="32" y="60" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9">[dept]</text>

    <rect x="176" y="34" width="150" height="30" rx="6" fill="#a855f7" fill-opacity="0.06" stroke="#a855f7" stroke-opacity="0.15" stroke-width="0.75"/>
    <text x="188" y="48" fill="#c084fc" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" font-weight="500">orderBy</text>
    <text x="188" y="60" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9">[salary desc]</text>

    <rect x="342" y="34" width="140" height="30" rx="6" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-opacity="0.15" stroke-width="0.75"/>
    <text x="354" y="48" fill="#fbbf24" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" font-weight="500">frame</text>
    <text x="354" y="60" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9">rows / range</text>

    <rect x="498" y="34" width="130" height="30" rx="6" fill="#22c55e" fill-opacity="0.06" stroke="#22c55e" stroke-opacity="0.15" stroke-width="0.75"/>
    <text x="510" y="48" fill="#4ade80" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" font-weight="500">functions</text>
    <text x="510" y="60" fill="#d4d4d8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9">rank, avg...</text>
  </g>

  <!-- Footer -->
  <text x="40" y="362" fill="#3f3f46" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9">Window functions compute values across partitions without reducing rows — every input row produces one output row</text>
</svg>